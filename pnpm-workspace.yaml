packages:
  - ./
  - ./cloudwatch-rum/pages
  - ./cloudwatch-rum/infra
  - ./cloudwatch-rum/infra/function
  - ./github-auth-ssg/frontend
  - ./github-auth-ssg/frontend/cdk
  - ./github-auth-ssg/backend
  - ./graphql-msw/frontend/cdk
  - ./graphql-msw/frontend
  - ./graphql-msw/backend
  - ./kuma-ui-example
  - ./next-amplified
  - ./next-gsap-example
  - ./next-i18n/app
  - ./next-i18n/infra
  - ./next-i18n/infra/function
  - ./next-ts-biome-example
  - ./next-zustand-example
  - ./nextjs-dynamic-routing-app/app
  - ./sticky-example
  - '!./with-beta/**'
  - ./wasm
  - ./wasm/app
  - ./wasm/infra
  - '!./with-preact/**'

auto-install-peers: true

enablePrePostScripts: true

legacy-peer-deps: true

onlyBuiltDependencies:
  - '@apollo/protobufjs'
  - '@biomejs/biome'
  - '@swc/core'
  - '@tailwindcss/oxide'
  - core-js
  - core-js-pure
  - esbuild
  - msw
  - next-plugin-preact
  - sharp
  - unrs-resolver

overrides:
  esbuild@<=0.24.2: '>=0.25.0'
  fast-xml-parser@<5.3.8: '>=5.3.8'
  nth-check@<2.0.1: '>=2.0.1'
  postcss@<8.4.31: '>=8.4.31'
  serialize-javascript@<=7.0.2: '>=7.0.3'
  webpack-dev-server@<=5.2.0: '>=5.2.1'

strictPeerDependencies: false
