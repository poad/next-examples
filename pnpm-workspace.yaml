packages:
  - ./
  - ./cloudwatch-rum/pages
  - ./cloudwatch-rum/infra
  - ./cloudwatch-rum/infra/function
  - ./github-auth-ssg/frontend
  - ./github-auth-ssg/frontend/cdk
  - ./github-auth-ssg/backend
  - ./graphql-msw/frontend/cdk
  - ./graphql-msw/frontend
  - ./graphql-msw/backend
  - ./kuma-ui-example
  - ./next-amplified
  - ./next-gsap-example
  - ./next-i18n/app
  - ./next-i18n/infra
  - ./next-i18n/infra/function
  - ./next-ts-biome-example
  - ./next-zustand-example
  - ./nextjs-dynamic-routing-app/app
  - ./sticky-example
  - '!./with-beta/**'
  - ./wasm
  - ./wasm/app
  - ./wasm/infra
  - '!./with-preact/**'

allowBuilds:
  '@apollo/protobufjs': false
  core-js-pure: false
  esbuild: false
  msw: false
  sharp: false
  unrs-resolver: false

blockExoticSubdeps: true

minimumReleaseAge: 10080 # 7 days in minutes

minimumReleaseAgeExclude:
  - pnpm@11.9.0
  - esbuild@0.24.3
  - lodash@4.17.24
  - postcss@8.5.10
  - immutable@3.8.3

overrides:
  chokidar: '>=5'
  esbuild@<=0.24.2: ^0.28.1
  eslint-import-resolver-typescript: '^4.4.5'
  immutable@<3.8.3: ^3.8.3
  lodash@<=4.17.23: ^4.17.24
  lodash@>=4.0.0 <=4.17.23: ^4.17.24
  postcss@<8.5.10: ^8.5.10
  semver: '>=7'
  ua-parser-js: '>=2'
  uuid@<11.1.1: ^14

trustPolicy: no-downgrade
trustPolicyExclude:
  - reselect@5.1.1
