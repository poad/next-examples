packages:
  - ./
  - ./cloudwatch-rum/pages
  - ./cloudwatch-rum/infra
  - ./cloudwatch-rum/infra/function
  - ./github-auth-ssg/frontend
  - ./github-auth-ssg/frontend/cdk
  - ./github-auth-ssg/backend
  - ./graphql-msw/frontend/cdk
  - ./graphql-msw/frontend
  - ./graphql-msw/backend
  - ./kuma-ui-example
  - ./next-amplified
  - ./next-gsap-example
  - ./next-i18n/app
  - ./next-i18n/infra
  - ./next-i18n/infra/function
  - ./next-ts-biome-example
  - ./next-zustand-example
  - ./nextjs-dynamic-routing-app/app
  - ./sticky-example
  - '!./with-beta/**'
  - ./wasm
  - ./wasm/app
  - ./wasm/infra
  - '!./with-preact/**'

allowBuilds:
  '@apollo/protobufjs': false
  esbuild: false
  msw: false
  sharp: false
  unrs-resolver: false

blockExoticSubdeps: true

minimumReleaseAge: 10080 # 7 days in minutes

minimumReleaseAgeExclude:
  - postcss@8.5.10
  - immutable@3.8.3
  - fast-xml-builder@1.1.7
  - fast-uri@3.1.2
  - '@babel/plugin-transform-modules-systemjs@7.29.4'
  - next@16.2.6
  - '@next/*'
  - lodash@4.17.24
  - ws@8.20.1
  - uuid@11.1.1
  - js-cookie@3.0.6
  - qs@6.15.2

overrides:
  '@babel/plugin-transform-modules-systemjs@>=7.12.0 <=7.29.3': ^7.29.4
  '@types/node': ^24
  chokidar: '>=5'
  esbuild@<=0.24.2: ^0.28
  eslint-import-resolver-typescript: '^4.4.4'
  fast-uri@<=3.1.1: ^3.1.2
  fast-xml-builder@<=1.1.6: ^1.1.7
  immutable@<3.8.3: ^3.8.3
  js-cookie@<=3.0.5: ^3.0.6
  lodash@<=4.17.23: ^4.17.24
  lodash@>=4.0.0 <=4.17.23: ^4.17.24
  next@>=16.0.0 <16.2.6: ^16.2.6
  postcss@<8.5.10: ^8.5.10
  qs@>=6.11.1 <=6.15.1: ^6.15.2
  semver: '>=7'
  ua-parser-js: '>=2'
  uuid@<11.1.1: ^11.1.1
  ws@>=8.0.0 <8.20.1: ^8.20.1

trustPolicy: no-downgrade
trustPolicyExclude:
  - reselect@5.1.1
