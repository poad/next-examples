packages:
  - ./
  - ./cloudwatch-rum/pages
  - ./cloudwatch-rum/infra
  - ./cloudwatch-rum/infra/function
  - ./github-auth-ssg/frontend
  - ./github-auth-ssg/frontend/cdk
  - ./github-auth-ssg/backend
  - ./graphql-msw/frontend/cdk
  - ./graphql-msw/frontend
  - ./graphql-msw/backend
  - ./kuma-ui-example
  - ./next-amplified
  - ./next-gsap-example
  - ./next-i18n/app
  - ./next-i18n/infra
  - ./next-i18n/infra/function
  - ./next-ts-biome-example
  - ./next-zustand-example
  - ./nextjs-dynamic-routing-app/app
  - ./sticky-example
  - '!./with-beta/**'
  - ./wasm
  - ./wasm/app
  - ./wasm/infra
  - '!./with-preact/**'

allowBuilds:
  '@apollo/protobufjs': false
  esbuild: false
  msw: false
  sharp: false
  unrs-resolver: false

blockExoticSubdeps: true

minimumReleaseAge: 10080 # 7 days in minutes

minimumReleaseAgeExclude:
  - pnpm@11.5.3
  - lodash@4.17.24
  - postcss@8.5.10
  - immutable@3.8.3
  - esbuild@0.28.1
  - '@esbuild/aix-ppc64@0.28.1'
  - '@esbuild/android-arm64@0.28.1'
  - '@esbuild/android-arm@0.28.1'
  - '@esbuild/android-x64@0.28.1'
  - '@esbuild/darwin-arm64@0.28.1'
  - '@esbuild/darwin-x64@0.28.1'
  - '@esbuild/freebsd-arm64@0.28.1'
  - '@esbuild/freebsd-x64@0.28.1'
  - '@esbuild/linux-arm64@0.28.1'
  - '@esbuild/linux-arm@0.28.1'
  - '@esbuild/linux-ia32@0.28.1'
  - '@esbuild/linux-loong64@0.28.1'
  - '@esbuild/linux-mips64el@0.28.1'
  - '@esbuild/linux-ppc64@0.28.1'
  - '@esbuild/linux-riscv64@0.28.1'
  - '@esbuild/linux-s390x@0.28.1'
  - '@esbuild/linux-x64@0.28.1'
  - '@esbuild/netbsd-arm64@0.28.1'
  - '@esbuild/netbsd-x64@0.28.1'
  - '@esbuild/openbsd-arm64@0.28.1'
  - '@esbuild/openbsd-x64@0.28.1'
  - '@esbuild/openharmony-arm64@0.28.1'
  - '@esbuild/sunos-x64@0.28.1'
  - '@esbuild/win32-arm64@0.28.1'
  - '@esbuild/win32-ia32@0.28.1'
  - '@esbuild/win32-x64@0.28.1'

overrides:
  '@types/node': ^24
  chokidar: '>=5'
  esbuild@<=0.24.2: ^0.28
  esbuild@>=0.17.0 <0.28.1: ^0.28.1
  esbuild@>=0.27.3 <0.28.1: ^0.28.1
  eslint-import-resolver-typescript: '^4.4.4'
  immutable@<3.8.3: ^3.8.3
  lodash@<=4.17.23: ^4.17.24
  lodash@>=4.0.0 <=4.17.23: ^4.17.24
  postcss@<8.5.10: ^8.5.10
  semver: '>=7'
  ua-parser-js: '>=2'
  uuid@<11.1.1: ^14

trustPolicy: no-downgrade
trustPolicyExclude:
  - reselect@5.1.1
